name: Feature request
description: Suggest a new capability or improvement for roark-analytics-python-livekit
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. What does the SDK make hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? API sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other shapes the API could take.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, LiveKit Agents docs, or anything else useful.
